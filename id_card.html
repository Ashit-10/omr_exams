<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID Generator - Auto Crop</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200">
        <h1 class="text-xl font-bold text-center text-slate-800 mb-2">IGNOU Practical Record</h1>
        <p class="text-slate-500 text-center text-sm mb-6">Upload your ID to auto-fill the template</p>
        
        <div class="space-y-4">
            <div class="relative group border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition-all">
                <input type="file" id="idInput" accept="application/pdf,image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <div id="uploadUI">
                    <span class="text-sm font-medium text-slate-600 block" id="fileLabel">Drop Student ID PDF/Image here</span>
                </div>
            </div>

            <button id="processBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">
                Generate A4 PDF
            </button>
        </div>

        <div id="status" class="mt-4 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        idInput.addEventListener('change', (e) => {
            if(e.target.files[0]) fileLabel.innerText = "Selected: " + e.target.files[0].name;
        });

        function updateStatus(msg, isErr = false) {
            status.innerText = msg;
            status.className = `mt-4 p-2 rounded text-center text-sm ${isErr ? 'text-red-600 bg-red-50' : 'text-indigo-600 bg-indigo-50'}`;
            status.classList.remove('hidden');
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0]) return updateStatus("Please select your ID Card.", true);

            try {
                updateStatus("Step 1: Loading Template...");
                const response = await fetch(TEMPLATE_URL);
                if (!response.ok) throw new Error("Template 'Id_card_format.pdf' not found.");
                const formatBytes = await response.arrayBuffer();

                const templateDoc = await PDFDocument.load(formatBytes);
                const a4Page = templateDoc.getPages()[0];
                const { width: a4W } = a4Page.getSize();

                const idFile = idInput.files[0];
                let idDims, idObject;

                updateStatus("Step 2: Processing ID & Cropping...");

                if (idFile.type === "application/pdf") {
                    const idBytes = await idFile.arrayBuffer();
                    const srcDoc = await PDFDocument.load(idBytes);
                    const srcPage = srcDoc.getPages()[0];

                    // --- SIMPLE AUTO-CROP LOGIC ---
                    // IGNOU IDs in PDFs often have large white margins. 
                    // We shrink the crop box to the center area where the ID usually sits.
                    const { width, height } = srcPage.getSize();
                    srcPage.setCropBox(width * 0.1, height * 0.2, width * 0.8, height * 0.6);

                    const embeddedPages = await templateDoc.embedPdf(srcDoc, [0]);
                    idObject = embeddedPages[0];
                    idDims = { width: idObject.width, height: idObject.height };
                } else {
                    const imgBytes = await idFile.arrayBuffer();
                    idObject = idFile.type.includes('png') ? await templateDoc.embedPng(imgBytes) : await templateDoc.embedJpg(imgBytes);
                    idDims = { width: idObject.width, height: idObject.height };
                }

                // DIMENSION & ROTATION LOGIC
                let rotation = 0;
                const targetHeight = 200; // As requested
                let drawW, drawH;

                if (idDims.height > idDims.width) {
                    // It's Vertical -> Rotate -90 degrees
                    rotation = -90;
                    drawH = (idDims.width / idDims.height) * targetHeight;
                    drawW = targetHeight;
                } else {
                    // It's Horizontal
                    drawH = targetHeight;
                    drawW = (idDims.width / idDims.height) * targetHeight;
                }

                // PLACEMENT LOGIC
                // x: centered, y: 550
                const xPos = (a4W / 2) - (drawW / 2) + (rotation !== 0 ? drawW : 0);
                const yPos = 550;

                const drawOptions = {
                    x: xPos,
                    y: yPos,
                    width: drawW,
                    height: drawH,
                    rotate: degrees(rotation)
                };

                if (idFile.type === "application/pdf") {
                    a4Page.drawPage(idObject, drawOptions);
                } else {
                    a4Page.drawImage(idObject, drawOptions);
                }

                updateStatus("Step 3: Generating Final PDF...");
                const pdfBytes = await templateDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Practical_Sheet_${Date.now()}.pdf`;
                link.click();

                updateStatus("Success! Check your downloads.");

            } catch (err) {
                console.error(err);
                updateStatus("Error: " + err.message, true);
            }
        });
    </script>
</body>
</html>
