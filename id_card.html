<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Layout Tester</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">ID Merger Tester</h1>
            <p class="text-gray-500 text-sm mt-2">Upload your ID and Format to merge</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">1. Student ID (PDF or Image)</label>
                <input type="file" id="idInput" accept="application/pdf,image/*" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-gray-200 rounded-lg"/>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">2. ID Card Format (PDF)</label>
                <input type="file" id="formatInput" accept="application/pdf" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer border border-gray-200 rounded-lg"/>
            </div>

            <button id="processBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all shadow-lg">
                Generate & Preview
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium hidden p-3 rounded-lg"></div>
    </div>

    <script>
        // Accessing PDFLib components
        const { PDFDocument, degrees } = PDFLib;

        const idInput = document.getElementById('idInput');
        const formatInput = document.getElementById('formatInput');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        function showStatus(msg, isError = false) {
            status.innerText = msg;
            status.className = `mt-6 text-center text-sm font-medium p-3 rounded-lg ${isError ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`;
            status.classList.remove('hidden');
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0] || !formatInput.files[0]) {
                return showStatus("Please upload both files.", true);
            }

            try {
                showStatus("Merging files... please wait.");
                
                // 1. Load the Format Template
                const formatBytes = await formatInput.files[0].arrayBuffer();
                const templateDoc = await PDFDocument.load(formatBytes);
                const firstPage = templateDoc.getPages()[0];
                const { width, height } = firstPage.getSize();

                // 2. Load the Student ID
                const idFile = idInput.files[0];
                let idObject, idDims;

                if (idFile.type === "application/pdf") {
                    const idBytes = await idFile.arrayBuffer();
                    const idDoc = await PDFDocument.load(idBytes);
                    // Embed the first page of the student ID
                    [idObject] = await templateDoc.embedPdf(idDoc, [0]);
                    idDims = idObject.scale(1);
                } else {
                    const imgBytes = await idFile.arrayBuffer();
                    idObject = idFile.type.includes('png') ? 
                        await templateDoc.embedPng(imgBytes) : 
                        await templateDoc.embedJpg(imgBytes);
                    idDims = idObject.scale(1);
                }

                // 3. Handle Orientation (Long side down)
                // We ensure the width is the longer side for the layout
                let rotation = 0;
                let targetWidth = 245; // Width in PDF points (~86mm)
                let targetHeight = (idDims.height / idDims.width) * targetWidth;

                if (idDims.height > idDims.width) {
                    rotation = -90; 
                    targetHeight = 245;
                    targetWidth = (idDims.width / idDims.height) * targetHeight;
                }

                // 4. Coordinates for Placement
                // cite: 2 (Template includes specific text fields like 'ENROLMENT NO' and 'NAME')
                const drawParams = {
                    x: (width / 2) - (targetWidth / 2) + (rotation !== 0 ? targetWidth : 0),
                    [span_0](start_span)y: height - 280, // Placing in the ID Card rectangle area[span_0](end_span)
                    width: targetWidth,
                    height: targetHeight,
                    rotate: degrees(rotation),
                };

                // 5. Draw ID onto Format
                if (idFile.type === "application/pdf") {
                    firstPage.drawPage(idObject, drawParams);
                } else {
                    firstPage.drawImage(idObject, drawParams);
                }

                // 6. Save and Download
                const pdfBytes = await templateDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Final_ID_Document.pdf";
                link.click();

                showStatus("Success! File downloaded.");

            } catch (err) {
                console.error("Layout Error:", err);
                showStatus("Error: " + err.message, true);
            }
        });
    </script>
</body>
</html>
