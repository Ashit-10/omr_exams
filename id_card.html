<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID Generator - Fixed Crop</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200">
        <h1 class="text-xl font-bold text-center text-slate-800 mb-6">IGNOU Practical Record</h1>
        
        <div class="space-y-4">
            <div class="relative group border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition-all">
                <input type="file" id="idInput" accept="application/pdf,image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <div id="uploadUI">
                    <span class="text-sm font-medium text-slate-600 block" id="fileLabel">Upload ID Card</span>
                </div>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg">
                Generate A4 PDF
            </button>
        </div>

        <div id="status" class="mt-4 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        idInput.addEventListener('change', (e) => {
            if(e.target.files[0]) fileLabel.innerText = "Selected: " + e.target.files[0].name;
        });

        function updateStatus(msg, isErr = false) {
            status.innerText = msg;
            status.className = `mt-4 p-2 rounded text-center text-sm ${isErr ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50'}`;
            status.classList.remove('hidden');
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0]) return updateStatus("Please select your ID Card.", true);

            try {
                updateStatus("Step 1: Fetching Template...");
                const response = await fetch(TEMPLATE_URL);
                if (!response.ok) throw new Error("Template file not found.");
                const formatBytes = await response.arrayBuffer();

                const templateDoc = await PDFDocument.load(formatBytes);
                const a4Page = templateDoc.getPages()[0];
                const { width: a4W } = a4Page.getSize();

                const idFile = idInput.files[0];
                let idObject, idDims;

                updateStatus("Step 2: Cropping & Aligning...");

                if (idFile.type === "application/pdf") {
                    const idBytes = await idFile.arrayBuffer();
                    const srcDoc = await PDFDocument.load(idBytes);
                    const srcPage = srcDoc.getPages()[0];
                    
                    // FORCE CROP: IGNOU IDs are usually at the top of the A4 download
                    // We crop to just the ID area (approx top half, centered)
                    const { width, height } = srcPage.getSize();
                    // This creates a box around the actual ID card area
                    srcPage.setCropBox(20, height - 300, width - 40, 280); 

                    const embeddedPages = await templateDoc.embedPdf(srcDoc, [0]);
                    idObject = embeddedPages[0];
                    idDims = { width: idObject.width, height: idObject.height };
                } else {
                    const imgBytes = await idFile.arrayBuffer();
                    idObject = idFile.type.includes('png') ? await templateDoc.embedPng(imgBytes) : await templateDoc.embedJpg(imgBytes);
                    idDims = { width: idObject.width, height: idObject.height };
                }

                // FIXED LOGIC: Only rotate if the CROPPED result is still vertical
                // For IGNOU IDs, they are almost always wider than they are tall (Horizontal)
                let rotation = 0;
                const targetHeight = 200;
                let drawW, drawH;

                // If height is significantly greater than width, it's vertical
                if (idDims.height > idDims.width * 1.1) {
                    rotation = -90;
                    drawW = targetHeight;
                    drawH = (idDims.width / idDims.height) * targetHeight;
                } else {
                    rotation = 0;
                    drawH = targetHeight;
                    drawW = (idDims.width / idDims.height) * targetHeight;
                }

                // CENTERING & PLACEMENT (y = 550)
                const xPos = (a4W / 2) - (drawW / 2) + (rotation !== 0 ? drawW : 0);
                const yPos = 550;

                const config = {
                    x: xPos,
                    y: yPos,
                    width: drawW,
                    height: drawH,
                    rotate: degrees(rotation)
                };

                if (idFile.type === "application/pdf") {
                    a4Page.drawPage(idObject, config);
                } else {
                    a4Page.drawImage(idObject, config);
                }

                updateStatus("Step 3: Saving...");
                const pdfBytes = await templateDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "IGNOU_Practical_Record.pdf";
                link.click();

                updateStatus("Success!");

            } catch (err) {
                console.error(err);
                updateStatus("Error: " + err.message, true);
            }
        });
    </script>
</body>
</html>
