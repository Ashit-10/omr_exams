<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Layout Tester</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">ID Merger Tester</h1>
            <p class="text-gray-500 text-sm mt-2">Upload both files to test the alignment</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">1. Student ID (PDF or Image)</label>
                <input type="file" id="idInput" accept="application/pdf,image/*" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-gray-200 rounded-lg"/>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">2. ID Card Format (PDF)</label>
                <input type="file" id="formatInput" accept="application/pdf" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer border border-gray-200 rounded-lg"/>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-lg">
                Generate & Preview
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;

        const idInput = document.getElementById('idInput');
        const formatInput = document.getElementById('formatInput');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        function showStatus(msg, isError = false) {
            status.innerText = msg;
            status.className = `mt-6 text-center text-sm font-medium p-3 rounded-lg ${isError ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`;
            status.classList.remove('hidden');
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0] || !formatInput.files[0]) {
                return showStatus("Please upload both files to proceed.", true);
            }

            try {
                showStatus("Processing...");
                
                [span_3](start_span)// Load the Format Template[span_3](end_span)
                const formatBytes = await formatInput.files[0].arrayBuffer();
                const templateDoc = await PDFDocument.load(formatBytes);
                const firstPage = templateDoc.getPages()[0];
                const { width, height } = firstPage.getSize();

                [span_4](start_span)// Load the Student ID[span_4](end_span)
                const idFile = idInput.files[0];
                let idObject, idDims;

                if (idFile.type === "application/pdf") {
                    const idBytes = await idFile.arrayBuffer();
                    const idDoc = await PDFDocument.load(idBytes);
                    [idObject] = await templateDoc.embedPdf(idDoc, [0]);
                    idDims = idObject.scale(1);
                } else {
                    const imgBytes = await idFile.arrayBuffer();
                    idObject = idFile.type.includes('png') ? await templateDoc.embedPng(imgBytes) : await templateDoc.embedJpg(imgBytes);
                    idDims = idObject.scale(1);
                }

                // Automatic Rotation Logic: Ensure long side is down
                let rotation = 0;
                let targetW = 245; // Fixed width for the ID rectangle in points
                let targetH = (idDims.height / idDims.width) * targetW;

                if (idDims.height > idDims.width) {
                    rotation = -90; // Rotate portrait to landscape
                    targetH = 245;
                    targetW = (idDims.width / idDims.height) * targetH;
                }

                [span_5](start_span)// Coordinates for "PRACTICAL RECORD ID CARD" space[span_5](end_span)
                // Centered horizontally, positioned near the top-mid section
                const drawParams = {
                    x: (width / 2) - (targetW / 2) + (rotation !== 0 ? targetW : 0),
                    y: height - 280, 
                    width: targetW,
                    height: targetH,
                    rotate: degrees(rotation),
                };

                // Apply to the template
                if (idFile.type === "application/pdf") {
                    firstPage.drawPage(idObject, drawParams);
                } else {
                    firstPage.drawImage(idObject, drawParams);
                }

                // Save and Download
                const pdfBytes = await templateDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Merged_ID_Format.pdf";
                link.click();

                showStatus("Success! Your PDF is downloading.");

            } catch (err) {
                console.error(err);
                showStatus("Error: " + err.message, true);
            }
        });
    </script>
</body>
</html>
