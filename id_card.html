<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID Generator</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200">
        <h1 class="text-xl font-bold text-center text-slate-800 mb-6">IGNOU Practical Record Generator</h1>
        
        <div class="space-y-4">
            <div class="relative group border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition-all">
                <input type="file" id="idInput" accept="application/pdf,image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <div id="uploadUI">
                    <span class="text-sm font-medium text-slate-600 block" id="fileLabel">Upload Student ID (PDF/Image)</span>
                </div>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg">
                Generate A4 PDF
            </button>
        </div>

        <div id="status" class="mt-4 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        
        // This MUST match the filename in your GitHub repo exactly
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        idInput.addEventListener('change', (e) => {
            if(e.target.files[0]) fileLabel.innerText = "Selected: " + e.target.files[0].name;
        });

        function updateStatus(msg, isErr = false) {
            status.innerText = msg;
            status.className = `mt-4 p-2 rounded text-center text-sm ${isErr ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50'}`;
            status.classList.remove('hidden');
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0]) return updateStatus("Please select your ID Card.", true);

            try {
                updateStatus("Step 1: Fetching Template...");
                const response = await fetch(TEMPLATE_URL);
                if (!response.ok) throw new Error("Template file not found in repo.");
                const formatBytes = await response.arrayBuffer();

                updateStatus("Step 2: Processing Layout...");
                const templateDoc = await PDFDocument.load(formatBytes);
                const a4Page = templateDoc.getPages()[0];
                const { width: a4W, height: a4H } = a4Page.getSize();

                const idFile = idInput.files[0];
                let idObject, idDims;

                if (idFile.type === "application/pdf") {
                    const idBytes = await idFile.arrayBuffer();
                    const idDoc = await PDFDocument.load(idBytes);
                    [idObject] = await templateDoc.embedPdf(idDoc, [0]);
                    idDims = idObject.scale(1);
                } else {
                    const imgBytes = await idFile.arrayBuffer();
                    idObject = idFile.type.includes('png') ? await templateDoc.embedPng(imgBytes) : await templateDoc.embedJpg(imgBytes);
                    idDims = idObject.scale(1);
                }

                let rotation = 0;
                const fixedHeight = 160; 
                let finalH = fixedHeight;
                let finalW = (idDims.width / idDims.height) * fixedHeight;

                if (idDims.height > idDims.width) {
                    rotation = -90;
                    finalW = fixedHeight; 
                    finalH = (idDims.width / idDims.height) * finalW;
                }

                // Precision placement based on your sample image
                a4Page.drawPage(idObject, {
                    x: (a4W / 2) - (finalW / 2) + (rotation !== 0 ? finalW : 0),
                    y: 520, 
                    width: finalW,
                    height: finalH,
                    rotate: degrees(rotation),
                });

                const pdfBytes = await templateDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Final_Practical_Format.pdf";
                link.click();

                updateStatus("Success! Check your downloads.");

            } catch (err) {
                updateStatus(err.message, true);
            }
        });
    </script>
</body>
</html>
