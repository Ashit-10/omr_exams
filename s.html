<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID & Data Generator</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-200">
        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">IGNOU Front Page Generator</h2>
        <p class="text-slate-500 text-sm text-center mb-6">Upload ID card & Enter Details</p>
        
        <div class="space-y-4">
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="courceCode" placeholder="Course Code" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="programCode" placeholder="Programme code" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="courseTitle" placeholder="Course Title" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="enrollmentNo" placeholder="Enrollment Number" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="nameInput" placeholder="Name" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="contactNo" placeholder="Contact number" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="relative border-2 border-dashed border-blue-300 rounded-xl p-4 text-center hover:bg-blue-50 transition-all">
                <input type="file" id="idInput" accept="application/pdf,image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <div id="uploadUI">
                    <span class="text-blue-600 font-bold text-sm block" id="fileLabel">Upload Student ID *</span>
                </div>
            </div>

            <div id="previewContainer" class="hidden">
                <p class="text-xs text-slate-400 mb-1 text-center">Cropped ID Preview:</p>
                <div class="flex justify-center border rounded-lg bg-white overflow-hidden p-2">
                    <canvas id="cropPreview" class="max-h-32 shadow-sm"></canvas>
                </div>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-transform active:scale-95">
                GENERATE & SEND
            </button>
        </div>

        <div id="status" class="mt-4 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const TG_BOT_TOKEN = 'YOUR_BOT_TOKEN'; 
        const TG_CHAT_ID = 'YOUR_CHAT_ID';     

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const previewCanvas = document.getElementById('cropPreview');
        const previewContainer = document.getElementById('previewContainer');

        let globalCroppedData = null;

        idInput.addEventListener('change', async (e) => {
            if(e.target.files[0]) {
                fileLabel.innerText = "Selected: " + e.target.files[0].name;
                updateStatus("Detecting ID Card...");
                globalCroppedData = await getCroppedImage(e.target.files[0]);
                
                const ctx = previewCanvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    previewCanvas.width = img.width;
                    previewCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    previewContainer.classList.remove('hidden');
                    updateStatus("ID Detected!");
                };
                img.src = globalCroppedData.dataUrl;
            }
        });

        function updateStatus(msg, isErr = false) {
            status.innerText = msg;
            status.className = `mt-4 p-2 rounded text-center text-sm ${isErr ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50'}`;
            status.classList.remove('hidden');
        }

        async function getCroppedImage(file) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getPage(1).getViewport({ scale: 2.0 }); // Corrected method
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            } else {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(r => img.onload = r);
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            }

            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;

            let top = h, bottom = 0, left = w, right = 0;
            let found = false;

            // We scan the middle area primarily
            for (let y = Math.floor(h * 0.1); y < Math.floor(h * 0.9); y++) {
                for (let x = Math.floor(w * 0.05); x < Math.floor(w * 0.95); x++) {
                    const idx = (y * w + x) * 4;
                    // Detect anything that isn't white (Threshold 245)
                    if (imgData[idx] < 245 || imgData[idx+1] < 245 || imgData[idx+2] < 245) {
                        if (y < top) top = y;
                        if (y > bottom) bottom = y;
                        if (x < left) left = x;
                        if (x > right) right = x;
                        found = true;
                    }
                }
            }

            if (!found) return { dataUrl: canvas.toDataURL(), isVertical: h > w };

            // --- THE FIX: ADD LARGE PADDING ---
            // We increase padding significantly (40-60px) to ensure the white border 
            // of the ID card is included.
            const padding = Math.min(w, h) * 0.05; // 5% of image size as dynamic padding
            const cropX = Math.max(0, left - padding);
            const cropY = Math.max(0, top - padding);
            const cropW = Math.min(w - cropX, (right - left) + (padding * 2));
            const cropH = Math.min(h - cropY, (bottom - top) + (padding * 2));

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            cropCanvas.getContext('2d').drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            
            return { dataUrl: cropCanvas.toDataURL('image/png'), isVertical: cropH > cropW };
        }

        async function sendToTelegram(pdfBlob, fileName, studentName) {
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('document', pdfBlob, fileName);
            formData.append('caption', `IGNOU Sheet: ${studentName || 'New User'}`);

            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) { console.error("TG Fail", err); }
        }

        processBtn.addEventListener('click', async () => {
            if (!globalCroppedData) return updateStatus("Please upload ID Card.", true);

            try {
                updateStatus("Finalizing PDF...");
                const response = await fetch(TEMPLATE_URL);
                const templateDoc = await PDFDocument.load(await response.arrayBuffer());
                const a4Page = templateDoc.getPages()[0];
                const font = await templateDoc.embedFont(StandardFonts.HelveticaBold);

                const idImage = await templateDoc.embedPng(globalCroppedData.dataUrl);
                
                // Fit ID card into the designated area
                const TARGET_W = 370; 
                const TARGET_H = 225;
                const ID_X = (a4Page.getWidth() - TARGET_W) / 2;
                const ID_Y = 390;

                let drawOpts = { x: ID_X, y: ID_Y, width: TARGET_W, height: TARGET_H };
                if (globalCroppedData.isVertical) {
                    drawOpts.rotate = degrees(-90);
                    drawOpts.x = ID_X + TARGET_W;
                }
                a4Page.drawImage(idImage, drawOpts);

                const getVal = (id) => document.getElementById(id).value;
                const style = { size: 18, font: font, color: rgb(0, 0, 0) };

                a4Page.drawText(getVal('courceCode'),  { x: 184, y: 330, ...style });
                a4Page.drawText(getVal('programCode'), { x: 215, y: 296, ...style });
                a4Page.drawText(getVal('courseTitle'), { x: 181, y: 260, ...style });
                a4Page.drawText(getVal('enrollmentNo'),{ x: 189, y: 224, ...style });
                a4Page.drawText(getVal('nameInput'),   { x: 126, y: 188, ...style });
                a4Page.drawText(getVal('contactNo'),  { x: 164, y: 154, ...style });

                const pdfBytes = await templateDoc.save();
                const pdfBlob = new Blob([pdfBytes], { type: "application/pdf" });

                updateStatus("Sending to Telegram...");
                await sendToTelegram(pdfBlob, "IGNOU_Practical.pdf", getVal('nameInput'));

                const link = document.createElement('a');
                link.href = URL.createObjectURL(pdfBlob);
                link.download = "IGNOU_Practical_Sheet.pdf";
                link.click();
                
                updateStatus("Success!");

            } catch (err) {
                updateStatus("Error: " + err.message, true);
            }
        });
    </script>
</body>
</html>
