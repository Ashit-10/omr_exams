<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Formatter</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f4f4f4;
    }
    textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
        font-size: 16px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    pre {
        background: white;
        padding: 15px;
        white-space: pre-wrap;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>

<h2>MCQ to Exam Format Converter</h2>

<textarea id="input" placeholder="Paste your MCQs here..."></textarea>
<button onclick="formatText()">Format</button>

<pre id="output"></pre>

<script>
function formatText() {
    let text = document.getElementById("input").value;

    // Split questions
    let lines = text.split("\n");
    let result = [];

    lines.forEach(line => {
        if(line.trim() === "") return;

        // Separate question and options
        let match = line.match(/^(.*?\?)(.*)$/);

        if(match) {
            let question = match[1].trim();
            let options = match[2].trim();

            // Clean spacing
            options = options
                .replace(/\s+/g, " ")
                .replace(/\(A\)/g, "(A)")
                .replace(/\(B\)/g, "  (B)")
                .replace(/\(C\)/g, "  (C)")
                .replace(/\(D\)/g, "  (D)");

            result.push(question);
            result.push(options);
        } else {
            result.push(line);
        }
    });

    document.getElementById("output").textContent = result.join("\n");
}
</script>

</body>
</html>
