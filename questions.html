<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle Questions & Options</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .input-container {
            position: relative;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        button {
            margin-top: 10px;
        }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
        }
        .shuffled-container {
            position: relative;
            margin-top: 10px;
        }
        .shuffled {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: "Times New Roman", serif;
            font-size: 16px;
            line-height: 1.5;
        }
        label {
            margin-top: 10px;
            display: block;
        }
        input[type="number"] {
            width: 50px;
        }
    </style>
</head>
<body>
    <h1>Shuffle Questions & Options</h1>

    <div class="input-container">
        <button class="copy-btn" onclick="copyRawInput()">Copy</button>
        <textarea id="inputText" placeholder="Paste your questions here..."></textarea>
    </div>

    <label for="numQuestions">Number of Questions:</label>
    <input type="number" id="numQuestions" min="1" value="50">
    <button onclick="shuffleQuestions()">Shuffle and Display</button>
    <button onclick="formatDocument()">Format Document</button>
    <button onclick="printShuffledQuestions()">Print</button>

    <div class="shuffled-container">
        <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
        <div id="shuffledQuestions" class="shuffled"></div>
    </div>

    <script>
        function copyRawInput() {
            const inputText = document.getElementById('inputText').value;
            navigator.clipboard.writeText(inputText).then(() => {
                alert('Raw input copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function shuffleQuestions() {
            const inputText = document.getElementById('inputText').value;
            const numQuestions = parseInt(document.getElementById('numQuestions').value, 10);
            
            // Extract whole blocks
            const questionBlocks = extractQuestions(inputText);
            const filteredBlocks = questionBlocks.filter(q => q.length >= 5);
            
            // Shuffle question order
            const randomizedBlocks = shuffleArray(filteredBlocks).slice(0, numQuestions);
            
            // Process each block (Shuffle options + re-number)
            // Joined with \n to ensure no extra line space between question numbers
            const finalOutput = randomizedBlocks.map((block, index) => {
                return processAndShuffleOptions(block, index + 1);
            }).join('\n');

            document.getElementById('shuffledQuestions').innerText = finalOutput;
        }

        function processAndShuffleOptions(block, newNumber) {
            // Remove the original number
            const cleanBlock = block.replace(/^\d+[\.\)]\s*/, '');
            
            // Regex to split by option markers (A, B, C, D)
            const optionRegex = /\s*[\(\[]?([A-D])[\)\]\.]\s*/g;
            const segments = cleanBlock.split(optionRegex);
            
            const questionStem = segments[0].trim();
            
            // Extract option text
            let optionsText = [];
            for (let i = 2; i < segments.length; i += 2) {
                if(segments[i] && segments[i].trim()) {
                    optionsText.push(segments[i].trim());
                }
            }

            // Shuffle options
            if (optionsText.length > 0) {
                optionsText = shuffleArray(optionsText);
            }

            // Re-apply labels
            const labels = ['A)', 'B)', 'C)', 'D)', 'E)'];
            const formattedOptions = optionsText.map((text, i) => `${labels[i]} ${text}`).join('   ');

            // Returns question and options on one line or two without blank lines
            return `${newNumber}. ${questionStem} ${formattedOptions}`;
        }

        function extractQuestions(text) {
            const questionPattern = /^\d+[\.\)]/gm;
            const lines = text.split('\n');
            const questions = [];
            let currentQuestion = '';

            lines.forEach(line => {
                if (questionPattern.test(line)) {
                    if (currentQuestion) {
                        questions.push(currentQuestion.trim());
                    }
                    currentQuestion = line;
                } else {
                    currentQuestion += ' ' + line.trim(); // Combine lines to prevent mid-question breaks
                }
            });

            if (currentQuestion) {
                questions.push(currentQuestion.trim());
            }

            return questions;
        }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function copyToClipboard() {
            const shuffledQuestions = document.getElementById('shuffledQuestions').innerText;
            navigator.clipboard.writeText(shuffledQuestions).then(() => {
                alert('Shuffled questions copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function printShuffledQuestions() {
            const shuffledQuestions = document.getElementById('shuffledQuestions').innerText;
            const printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<pre style="font-family: Times New Roman, serif; font-size: 16px; line-height: 1.2; white-space: pre-wrap;">' + shuffledQuestions + '</pre>');
            printWindow.document.close();
            printWindow.focus();
            printWindow.print();
        }

        function formatDocument() {
            const inputText = document.getElementById('inputText').value;
            const formattedText = inputText
                .replace(/\(\s*A\)/g, 'A)')
                .replace(/\(\s*B\)/g, 'B)')
                .replace(/\(\s*C\)/g, 'C)')
                .replace(/\(\s*D\)/g, 'D)');
            
            document.getElementById('shuffledQuestions').innerText = formattedText;
        }
    </script>
</body>
</html>
