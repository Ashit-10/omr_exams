<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Formatter</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }
    textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
        font-size: 16px;
        padding: 10px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    pre {
        background: white;
        padding: 15px;
        white-space: pre-wrap;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>

<h2>MCQ Formatter (Your Format)</h2>

<textarea id="input" placeholder="Paste your MCQs here..."></textarea>
<button onclick="formatMCQ()">Format</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
function formatMCQ() {
    let text = document.getElementById("input").value;

    // Remove things like [2021-22- SA-I]
    text = text.replace(/\[.*?\]/g, "");

    // Convert (A) → A)
    text = text.replace(/\((A|B|C|D)\)/g, "$1)");

    // Remove extra spaces
    text = text.replace(/\n\s*\n/g, "\n");

    // Add line break before options
    text = text.replace(/(A\))/g, "\n$1");
    text = text.replace(/(B\))/g, "\n$1");
    text = text.replace(/(C\))/g, "\n$1");
    text = text.replace(/(D\))/g, "\n$1");

    document.getElementById("output").textContent = text.trim();
}
</script>

</body>
</html>
